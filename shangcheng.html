<style>
/* 二维码区域样式 - 仅在本页生效 */
.qr-section {
    width: 100%;
    min-height: 500px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 0;
    background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
}

.qr-box {
    background: #fff;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    text-align: center;
    position: relative;
    overflow: hidden;
}

.qr-box::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(233,69,96,0.1) 0%, transparent 70%);
    animation: pulse 3s ease-in-out infinite;
}

@keyframes pulse {
    0%, 100% { transform: scale(0.8); }
    50% { transform: scale(1.1); }
}

.qr-title {
    font-size: 28px;
    color: #333;
    margin-bottom: 30px;
    font-weight: bold;
    letter-spacing: 4px;
    position: relative;
    z-index: 1;
}

.qr-wrapper {
    width: 300px;
    height: 300px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
    background: #fff;
    padding: 15px;
    border: 3px solid #e94560;
    border-radius: 15px;
}

.qr-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

.qr-hint {
    margin-top: 25px;
    color: #666;
    font-size: 16px;
    letter-spacing: 2px;
    position: relative;
    z-index: 1;
}

/* 装饰角 */
.corner {
    position: absolute;
    width: 30px;
    height: 30px;
    border: 4px solid #e94560;
}

.corner-tl { top: 15px; left: 15px; border-right: none; border-bottom: none; border-radius: 5px 0 0 0; }
.corner-tr { top: 15px; right: 15px; border-left: none; border-bottom: none; border-radius: 0 5px 0 0; }
.corner-bl { bottom: 15px; left: 15px; border-right: none; border-top: none; border-radius: 0 0 0 5px; }
.corner-br { bottom: 15px; right: 15px; border-left: none; border-top: none; border-radius: 0 0 5px 0; }

/* 扫码提示 */
.scan-tip {
    display: inline-block;
    margin-top: 15px;
    padding: 10px 30px;
    background: #e94560;
    color: #fff;
    border-radius: 25px;
    font-size: 14px;
    letter-spacing: 3px;
}
</style>
